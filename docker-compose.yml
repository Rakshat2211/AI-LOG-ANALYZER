services:
  backend:
    build: .
    container_name: intelligent-log-backend

    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - .:/app

  frontend:
    build: .

    container_name: intelligent-log-frontend

    command: streamlit run frontend/app.py --server.port=8501 --server.address=0.0.0.0

    ports:
      - "8501:8501"

    env_file:
      - .env

    volumes:
      - .:/app

    depends_on:
      - backend